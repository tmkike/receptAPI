<main class="login-page">
  <section class="login-card">
    <div class="login-copy">
      <p class="eyebrow">Bejelentkezés</p>
      <h1>Üdv újra a Recept Tárban!</h1>
      <p>
        Jelentkezz be, hogy elérd a kedvenc receptjeidet, és bármikor
        folytathasd a saját receptgyűjteményed építését.
      </p>
    </div>

    <form class="login-form" (ngSubmit)="login()">
      <label for="email">E-mail cím</label>
      <input
        id="email"
        name="email"
        type="email"
        placeholder="pelda@email.hu"
        [(ngModel)]="email"
        (ngModelChange)="clearMessages()"
        [attr.aria-invalid]="errorMessage() ? 'true' : null"
        [attr.aria-describedby]="errorMessage() ? 'loginError' : null"
      />

      <label for="password">Jelszó</label>
      <input
        id="password"
        name="password"
        type="password"
        placeholder="Add meg a jelszavad"
        [(ngModel)]="password"
        (ngModelChange)="clearMessages()"
        [attr.aria-invalid]="errorMessage() ? 'true' : null"
        [attr.aria-describedby]="errorMessage() ? 'loginError' : null"
      />

      <div class="form-row">
        <label class="remember">
          <input type="checkbox" />
          <span>Emlékezz rám</span>
        </label>
        <a routerLink="/elfelejtett-jelszo">Elfelejtett jelszó?</a>
      </div>

      <button type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Bejelentkezés...' : 'Bejelentkezés' }}
      </button>

      @if (errorMessage()) {
        <p id="loginError" class="error-message" role="alert">{{ errorMessage() }}</p>
      }

      <p class="register-text">
        Még nincs fiókod?
        <a routerLink="/regisztracio">Regisztrálj itt</a>
      </p>
    </form>
  </section>
</main>
