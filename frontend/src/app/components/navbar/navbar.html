<header class="header">
  <div class="search-section">
    <div class="social-box" aria-label="Közösségi média linkek">
      <a href="https://www.youtube.com/" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21.6 7.2s-.2-1.5-.8-2.1c-.8-.8-1.7-.8-2.1-.9C15.8 4 12 4 12 4s-3.8 0-6.7.2c-.4.1-1.3.1-2.1.9-.6.6-.8 2.1-.8 2.1S2.2 9 2.2 10.8v1.7c0 1.8.2 3.6.2 3.6s.2 1.5.8 2.1c.8.8 1.8.8 2.3.9 1.7.2 6.5.2 6.5.2s3.8 0 6.7-.2c.4-.1 1.3-.1 2.1-.9.6-.6.8-2.1.8-2.1s.2-1.8.2-3.6v-1.7c0-1.8-.2-3.6-.2-3.6ZM10.2 14.8V8.5l5.8 3.2-5.8 3.1Z" />
        </svg>
      </a>
      <a href="https://www.instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7.8 2h8.4A5.8 5.8 0 0 1 22 7.8v8.4a5.8 5.8 0 0 1-5.8 5.8H7.8A5.8 5.8 0 0 1 2 16.2V7.8A5.8 5.8 0 0 1 7.8 2Zm0 2A3.8 3.8 0 0 0 4 7.8v8.4A3.8 3.8 0 0 0 7.8 20h8.4a3.8 3.8 0 0 0 3.8-3.8V7.8A3.8 3.8 0 0 0 16.2 4H7.8Zm8.9 2.1a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4ZM12 7.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8Zm0 2a2.9 2.9 0 1 0 0 5.8 2.9 2.9 0 0 0 0-5.8Z" />
        </svg>
      </a>
      <a href="https://www.facebook.com/" target="_blank" rel="noopener noreferrer" aria-label="Facebook">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M22 12a10 10 0 1 0-11.6 9.9v-7h-2.5V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.4h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12Z" />
        </svg>
      </a>
    </div>

    @if (isLoggedIn) {
      <div class="profile-box">
        <span>{{ username }}</span>
        <button type="button" (click)="logout()">Kilépés</button>
      </div>
    }

    <div class="search-wrap">
      <div class="search-box">
        <input
          type="text"
          placeholder="Keresés..."
          [(ngModel)]="searchText"
          (ngModelChange)="onSearchChange()"
          (keydown.enter)="onSearch()"
        />
        <button type="button" (click)="onSearch()">Keresés</button>
      </div>

      @if (suggestions.length) {
        <div class="suggestions" aria-label="Keresési javaslatok">
          @for (suggestion of suggestions; track suggestion.receptNev) {
            <button type="button" (click)="selectSuggestion(suggestion.receptNev)">
              {{ suggestion.receptNev }}
            </button>
          }
        </div>
      }
    </div>
  </div>

  <nav class="navbar" aria-label="Fő navigáció">
    <a routerLink="/kezdooldal">Kezdőoldal</a>
    <a routerLink="/receptek">Receptek</a>
    <a routerLink="/hozzaad">Recept feltöltése</a>
    @if (isLoggedIn) {
      <a routerLink="/kedvencek">Kedvencek</a>
    } @else {
      <a routerLink="/bejelentkezes">Bejelentkezés</a>
    }
    @if (isLoggedIn) {
      <button class="nav-button" type="button" (click)="logout()">Kijelentkezés</button>
    } @else {
      <a routerLink="/regisztracio">Regisztráció</a>
    }
    
  </nav>
</header>
