<header class="header">
  <div class="search-section">
    <div class="search-box">
      <input
        type="text"
        placeholder="Keresés..."
        [(ngModel)]="searchText"
      />
      <button (click)="onSearch()">Keresés</button>
    </div>
  </div>

  <nav class="navbar" aria-label="Fő navigáció">
    <a
      routerLink="/kezdooldal"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Kezdőoldal
    </a>
    <a routerLink="/receptek" routerLinkActive="active">Receptek</a>
    <a routerLink="/kedvencek" routerLinkActive="active">Kedvencek</a>
    <a routerLink="/hozzaad" routerLinkActive="active">Recept feltöltése</a>
    <a routerLink="/bejelentkezes" routerLinkActive="active">Bejelentkezés</a>
    <a routerLink="/regisztracio" routerLinkActive="active">Regisztráció</a>
  </nav>
</header>
